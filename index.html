<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>品牌营销概念测试 | 随机10题模式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6edf4 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 24px 20px;
            color: #1a2c3e;
            min-height: 100vh;
        }
        .app-container { max-width: 1000px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0,0,0,0.03);
        }
        .hero { text-align: center; margin-bottom: 2rem; }
        .hero h1 { font-size: 2.2rem; background: linear-gradient(135deg, #1e2f3e, #2c7da0); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .hero p { color: #4a627a; margin-bottom: 1.5rem; }
        .feature-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 1.5rem 0; }
        .feature-tag { background: #eef2f5; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; color: #2c7da0; }
        .start-btn { background: #2c7da0; color: white; border: none; padding: 14px 40px; font-size: 1.2rem; font-weight: 600; border-radius: 60px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(44,125,160,0.3); margin-top: 0.5rem; }
        .start-btn:hover { background: #1f607e; transform: translateY(-2px); }
        .info-text { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e2edf2; color: #6c86a0; font-size: 0.85rem; }
        .progress-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 14px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .score-box { background: #1e2f3e; color: white; padding: 6px 16px; border-radius: 60px; font-weight: 600; font-size: 1rem; }
        .counter { font-weight: 500; background: #ffffffcc; padding: 6px 16px; border-radius: 40px; font-size: 0.9rem; }
        .exit-btn { background: #cfdee9; color: #1e3b4a; padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; cursor: pointer; border: none; font-weight: 500; }
        .q-text { font-size: 1.3rem; font-weight: 600; line-height: 1.4; margin-bottom: 1.2rem; background: #f9fcff; padding: 0.8rem 1rem; border-radius: 1.5rem; border-left: 5px solid #2c7da0; }
        .badge-hint { font-size: 0.75rem; background: #eef2f5; display: inline-block; padding: 4px 12px; border-radius: 30px; margin-bottom: 20px; color: #2c7da0; font-weight: 500; }
        .options-area { display: flex; flex-direction: column; gap: 12px; margin: 24px 0 20px; }
        .option-item { display: flex; align-items: center; gap: 14px; background: #f8fafd; padding: 10px 16px; border-radius: 60px; border: 1px solid #e2edf2; transition: all 0.2s; cursor: pointer; }
        .option-item:hover { background: #eef3fc; border-color: #a0c4d9; }
        .option-item input { width: 18px; height: 18px; accent-color: #2c7da0; cursor: pointer; }
        .option-item label { font-size: 0.95rem; font-weight: 500; color: #1e2f3e; cursor: pointer; flex: 1; }
        .action-buttons { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
        button { border: none; background: #2c7da0; color: white; font-weight: 600; padding: 10px 24px; border-radius: 40px; font-size: 0.9rem; cursor: pointer; transition: 0.2s; }
        button.secondary { background: #cfdee9; color: #1e3b4a; }
        button.secondary:hover { background: #bdd0df; }
        button:hover { background: #1f607e; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-area { margin-top: 18px; padding: 16px; background: #eef4fa; border-radius: 24px; border-left: 5px solid #2c7da0; font-size: 0.9rem; line-height: 1.5; }
        .correct-feedback { border-left-color: #2c8c5a; background: #e6f4ed; }
        .wrong-feedback { border-left-color: #d45a4a; background: #fef2f0; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 18px; gap: 12px; }
        .final-score-card { text-align: center; }
        .mistake-list { text-align: left; margin-top: 24px; max-height: 450px; overflow-y: auto; border-top: 2px solid #e2edf2; padding-top: 20px; }
        .mistake-item { background: #fff8f0; border-left: 4px solid #d45a4a; padding: 14px; margin-bottom: 14px; border-radius: 14px; }
        .mistake-question { font-weight: 700; margin-bottom: 8px; color: #bc5a2c; font-size: 0.9rem; }
        .mistake-detail { font-size: 0.8rem; color: #4a5568; margin-top: 6px; line-height: 1.4; }
        .badge-mistake { background: #d45a4a20; color: #bc5a2c; padding: 2px 10px; border-radius: 30px; font-size: 0.7rem; display: inline-block; margin-bottom: 6px; }
        .new-quiz-btn { background: #2c7da0; margin-top: 20px; }
        @media (max-width: 600px) { .card { padding: 1.2rem; } .hero h1 { font-size: 1.6rem; } .q-text { font-size: 1.1rem; } }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
<script>
    // 概念列表
    const CONCEPT_LIST = ["品牌形象", "品牌曝光率", "品牌存在感", "品牌知名度", "品牌联想", "品牌资产", "品牌信任"];
    
    // 权威修正版50题（基于营销学经典理论）
    const FULL_QUESTIONS = [
        // 品牌形象（B1-B10）
        { text: "很多人认为劳斯莱斯代表着“尊贵、奢华、稀有”。", correct: ["品牌形象","品牌联想"], explanation: "劳斯莱斯的尊贵印象是消费者主观形成的整体形象（品牌形象），同时也构成了“尊贵”这个属性联想（品牌联想）。" },
        { text: "沃尔沃汽车多年来被消费者公认为“最安全的汽车”。", correct: ["品牌形象","品牌联想"], explanation: "安全是沃尔沃在消费者心中的核心形象特征，也是安全属性的品牌联想。" },
        { text: "苹果用户觉得iPhone的设计“简约、高级、有科技感”。", correct: ["品牌形象"], explanation: "这是消费者对苹果品牌的主观整体印象，属于品牌形象。" },
        { text: "无印良品的产品风格让人感觉“极简、环保、自然”。", correct: ["品牌形象"], explanation: "无印良品的日式极简风格是消费者形成的品牌整体印象。" },
        { text: "哈雷戴维森摩托车让车主觉得“自由、狂野、硬汉”。", correct: ["品牌形象","品牌联想"], explanation: "这是哈雷品牌的个性形象和情感联想。" },
        { text: "迪士尼乐园给人的印象是“梦幻、欢乐、童话”。", correct: ["品牌形象"], explanation: "迪士尼的整体情感体验构成了品牌形象。" },
        { text: "爱马仕Birkin包被视为“身份和品味的象征”。", correct: ["品牌形象","品牌联想"], explanation: "这是品牌形象中的“地位象征”维度。" },
        { text: "红牛功能饮料给人的感觉是“极限、活力、挑战”。", correct: ["品牌形象"], explanation: "红牛通过极限运动营销塑造的品牌个性形象。" },
        { text: "全聚德烤鸭在游客心中是“北京老字号、正宗”。", correct: ["品牌形象"], explanation: "老字号正宗的印象属于品牌形象。" },
        { text: "野兽派花店让人感觉“文艺、精致、有格调”。", correct: ["品牌形象"], explanation: "品牌通过店铺设计和包装营造的形象感知。" },

        // 品牌曝光率（E1-E10）
        { text: "麦当劳在上海所有地铁站投放了为期一个月的灯箱广告，每天被100万人次看到。", correct: ["品牌曝光率"], explanation: "描述的是广告投放的频率和覆盖人次，属于客观曝光次数。" },
        { text: "某新品牌在抖音一天内投放了5000条达人短视频，总播放量达到2亿次。", correct: ["品牌曝光率"], explanation: "播放量和投放数量都是曝光频率的直接体现。" },
        { text: "康师傅绿茶在超市货架上占据了最显眼的位置，每个进店顾客都会经过。", correct: ["品牌曝光率"], explanation: "货架位置带来的被动视觉接触是线下曝光率的重要形式。" },
        { text: "双十一期间，完美日记在李佳琦直播间连续7天出现，每次露出3分钟。", correct: ["品牌曝光率"], explanation: "直播露出时长和频次属于品牌曝光率范畴。" },
        { text: "格力空调“好空调，格力造”的广告在央视连续播放了15年。", correct: ["品牌曝光率","品牌知名度"], explanation: "长期高频播放首先增加曝光率，进而提升品牌知名度。" },
        { text: "你每天上下班路过公交站台，都能看到京东健康的广告牌。", correct: ["品牌曝光率"], explanation: "每日固定路线的被动接触属于日常曝光率。" },
        { text: "拼多多在2021年春晚发放了20亿红包，当晚App下载量登顶。", correct: ["品牌曝光率","品牌知名度"], explanation: "春晚超级曝光带来大量用户首次认识该品牌。" },
        { text: "某品牌在小红书铺了10000篇素人笔记，搜索品牌名时全屏都是。", correct: ["品牌曝光率"], explanation: "小红书笔记数量是平台内的曝光密度。" },
        { text: "你刷微博时连续刷到3条同一个护肤品的开屏广告。", correct: ["品牌曝光率"], explanation: "广告重复出现是典型的曝光频率增加。" },
        { text: "机场行李转盘上的LED屏每30秒轮播一次某奢侈品牌的广告。", correct: ["品牌曝光率"], explanation: "广告循环播放是曝光率的实现方式。" },

        // 品牌存在感（P1-P10）- 严格限定“需求/场景触发”
        { text: "当你想吃火锅时，脑海中第一个跳出来的品牌是海底捞。", correct: ["品牌存在感"], explanation: "特定场景（想吃火锅）下首先想到的品牌，是存在感的典型表现。触发点是内在需求，而非外部符号。" },
        { text: "口渴想买水时，你不假思索地拿了农夫山泉。", correct: ["品牌存在感"], explanation: "消费场景下的下意识选择说明品牌存在感极强。触发点是口渴需求。" },
        { text: "提到“豪华电动车”，消费者首先想到的是特斯拉，而不是宝马或奔驰。", correct: ["品牌存在感","品牌知名度"], explanation: "品类首想关联是存在感+高知名度的双重体现。触发点是品类概念。" },
        { text: "你要买一部3000元左右的手机，心里立刻冒出了“小米”和“荣耀”两个选项。", correct: ["品牌存在感"], explanation: "消费决策时自动浮出的品牌选项代表心智中的存在感。触发点是购买需求。" },
        { text: "朋友说要请客吃日料，你立刻说“我们去元气寿司吧”。", correct: ["品牌存在感"], explanation: "日料场景下主动提议的品牌，是存在感的直接体现。触发点是就餐场景。" },
        { text: "买电池时你从没特意关注过品牌，但每次都会拿“那只铜头电池”（金霸王）。", correct: ["品牌存在感"], explanation: "无意识重复购买说明品牌存在感已经植入心智。触发点是买电池需求。" },
        { text: "想去健身房时，第一个想到“乐刻”而不是其他连锁品牌。", correct: ["品牌存在感"], explanation: "场景触发的品牌首位回忆。触发点是健身需求。" },
        { text: "周末想找个地方喝下午茶，你立刻想到了“星巴克”。", correct: ["品牌存在感"], explanation: "休闲场景下的品牌首选，触发点是下午茶需求。" },
        { text: "家里纸巾用完了要去买，你脱口而出“买洁柔”。", correct: ["品牌存在感"], explanation: "补货需求触发品牌回忆，是存在感的体现。" },
        { text: "想买礼物送长辈，第一个想到“脑白金”。", correct: ["品牌存在感"], explanation: "特定送礼场景下的品牌首选，触发点是礼物需求。" },

        // 品牌知名度（A1-A5）- 严格限定“是否知道品牌存在”
        { text: "市场调研中，85%的受访者表示“听说过”农夫山泉这个品牌。", correct: ["品牌知名度"], explanation: "“听说过”是知名度（提示认知）的核心测量指标，不涉及属性知识。" },
        { text: "在未经任何提示的情况下，42%的消费者能说出“国产运动品牌第一是安踏”。", correct: ["品牌知名度","品牌存在感"], explanation: "未提示下能被回忆属于高知名度+品类首位存在感。" },
        { text: "一个从未投放过广告的小众设计师品牌，只有业内少数人知道。", correct: ["品牌知名度"], explanation: "知道的人少意味着知名度低。" },
        { text: "提到“碳酸饮料”，98%的消费者能说出“可口可乐”。", correct: ["品牌知名度","品牌存在感"], explanation: "品类提示下的高回忆率是知名度+存在感的共同体现。" },
        { text: "你问一个农村老人知道“华为”吗？他说“听过，做手机的”。", correct: ["品牌知名度"], explanation: "仅知道品牌存在和基础品类，属于知名度范畴。不涉及具体属性联想。" },

        // 品牌联想（C1-C10）- 严格限定“外部线索触发”
        { text: "看到“怕上火喝XXX”，99%的人能自动补全“王老吉”（或加多宝）。", correct: ["品牌联想"], explanation: "广告语与品牌之间的强语义联想。触发点是外部文字刺激。" },
        { text: "“Just Do It”这句口号让人立刻想到Nike。", correct: ["品牌联想"], explanation: "口号与品牌之间的经典联想。触发点是外部口号刺激。" },
        { text: "提起“钻石”，很多人会想到De Beers的“钻石恒久远，一颗永流传”。", correct: ["品牌联想"], explanation: "品类属性与品牌之间的深度绑定联想。触发点是品类词刺激。" },
        { text: "看到蓝色的老虎机图标，你立刻想到“天猫”。", correct: ["品牌联想"], explanation: "视觉符号与品牌之间的联想。触发点是外部视觉刺激。" },
        { text: "说起“服务好到变态”，消费者脑海中浮现的是海底捞。", correct: ["品牌联想"], explanation: "服务特性与品牌之间的强属性联想。触发点是特性描述。" },
        { text: "孩子看到金色的“M”字母就说要去吃汉堡。", correct: ["品牌联想","品牌知名度"], explanation: "金色M是麦当劳的视觉符号，孩子看到符号立刻联想到品牌，是典型的品牌联想（外部符号触发）。同时认识符号也体现了知名度。" },
        { text: "手机输入法打出“纵享丝滑”四个字后，自动联想出“德芙”。", correct: ["品牌联想"], explanation: "“纵享丝滑”是德芙的经典广告语，输入法自动补全说明广告语与品牌之间形成了强语义联想，属于典型的品牌联想。没有消费场景触发，不构成存在感。" },
        { text: "你问一个5岁小孩“可口可乐是什么颜色的”，他能回答“红色”。", correct: ["品牌联想"], explanation: "知道品牌的基本属性（颜色）属于品牌联想（可口可乐与红色之间的属性联想），而不仅仅是“听说过”品牌。" },
        { text: "看到黄色拱门形状，你就知道那是麦当劳。", correct: ["品牌联想"], explanation: "视觉符号与品牌之间的联想。触发点是外部符号。" },
        { text: "听到“灯厂”两个字，车迷立刻想到奥迪。", correct: ["品牌联想"], explanation: "绰号与品牌之间的属性联想。" },

        // 品牌资产（V1-V5）
        { text: "即使华为手机卖得比小米贵，很多人仍然愿意购买华为。", correct: ["品牌资产"], explanation: "品牌带来的溢价能力是品牌资产的核心体现。" },
        { text: "闲鱼上，一个绝版的肯德基儿童套餐玩具能卖出原价10倍的价格。", correct: ["品牌资产"], explanation: "品牌衍生品的收藏溢价是品牌资产的变现。" },
        { text: "可口可乐曾经声称：就算全球工厂被烧，凭“可口可乐”四个字也能重新站起来。", correct: ["品牌资产"], explanation: "品牌的财务价值和商誉价值是品牌资产的核心。" },
        { text: "同一件白T恤，印上Supreme的Logo价格翻5倍，并且还有人排队买。", correct: ["品牌资产"], explanation: "Logo本身带来的溢价能力是品牌资产的直接证据。" },
        { text: "你和朋友打赌说“麦当劳未来10年绝不会倒闭”，因为你相信它的品牌价值。", correct: ["品牌资产"], explanation: "品牌带来的忠诚度和市场稳定性是品牌资产的一部分。" },

        // 品牌信任（T1-T5）
        { text: "你妈妈买洗衣粉只认雕牌，说“别的牌子洗不干净，也不放心”。", correct: ["品牌信任"], explanation: "长期使用形成的可靠性信赖是品牌信任的典型表现。" },
        { text: "某奶粉品牌出现质量问题后公开召回并赔偿，消费者在评论区说“态度诚恳，还会继续支持”。", correct: ["品牌信任"], explanation: "危机后仍愿原谅和支持说明品牌信任基础牢固。" },
        { text: "三聚氰胺事件后，很多家长至今不敢买某个国产奶粉品牌。", correct: ["品牌信任"], explanation: "信任一旦被破坏会持续影响消费者选择。" },
        { text: "你愿意在京东上买大件家电，因为觉得“京东自营不会有假货”。", correct: ["品牌信任"], explanation: "对平台商品真实性的信赖是品牌信任。" },
        { text: "疫情期间某烘焙品牌给医护人员免费送面包，大众点评上多了500条“良心商家”的好评。", correct: ["品牌信任","品牌形象"], explanation: "公益行为塑造信任感，同时丰富品牌形象。" }
    ];

    function getRandomQuestions(n) {
        const shuffled = [...FULL_QUESTIONS];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, n).map(q => ({
            ...q,
            options: [...CONCEPT_LIST]
        }));
    }

    new Vue({
        el: '#app',
        template: `
            <div>
                <div v-if="mode === 'home'" class="card">
                    <div class="hero">
                        <h1>📊 品牌营销概念测试</h1>
                        <p>区分「品牌形象」「品牌曝光率」「品牌存在感」「品牌联想」等易混概念</p>
                        <div class="feature-list">
                            <span class="feature-tag">🎲 每次随机10题</span>
                            <span class="feature-tag">📱 通勤碎片时间</span>
                            <span class="feature-tag">📝 错题本记录</span>
                            <span class="feature-tag">💡 权威解析</span>
                            <span class="feature-tag">✅ 答案经专业校准</span>
                        </div>
                        <button class="start-btn" @click="startNewQuiz">✨ 开始随机测试 ✨</button>
                        <div class="info-text">
                            ⚡ 共50道权威题库，每次随机抽取10题<br>
                            📖 完成测试后自动记录错题，可反复开始新测试<br>
                            🎓 答案基于营销学经典理论（科特勒/Aaker）
                        </div>
                    </div>
                </div>

                <div v-else-if="mode === 'quiz' && !quizFinished">
                    <div class="progress-card">
                        <div class="counter">第 {{ currentIndex+1 }} / {{ totalQuestions }} 题</div>
                        <div class="score-box">✅ 得分: {{ correctCount }} / {{ answeredCount }}</div>
                        <button class="exit-btn" @click="exitToHome">🏠 退出</button>
                    </div>
                    <div class="card">
                        <div class="badge-hint">⚡ 可多选（点击选项或文字）</div>
                        <div class="q-text">{{ currentQuestion.text }}</div>
                        <div class="options-area">
                            <div v-for="opt in currentQuestion.options" :key="opt" class="option-item" @click="toggleOption(opt)">
                                <input type="checkbox" :value="opt" v-model="selectedForCurrent" :id="'opt_'+opt">
                                <label :for="'opt_'+opt">{{ opt }}</label>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button @click="submitAnswer" :disabled="submitted">✓ 提交本题</button>
                            <button class="secondary" @click="clearCurrent" :disabled="submitted">↺ 重置</button>
                        </div>
                        <div v-if="showFeedback" class="result-area" :class="{'correct-feedback': isCurrentCorrect, 'wrong-feedback': !isCurrentCorrect}">
                            <strong>{{ isCurrentCorrect ? '✓ 正确' : '✗ 错误' }}</strong><br>
                            <span>✅ 正确答案: {{ currentQuestion.correct.join('、') }}</span><br>
                            <span>📘 {{ currentQuestion.explanation }}</span>
                        </div>
                        <div v-if="showFeedback" class="nav-buttons">
                            <button @click="prevQuestion" :disabled="currentIndex === 0">◀ 上一题</button>
                            <button @click="nextQuestion" :disabled="currentIndex === totalQuestions-1">下一题 ▶</button>
                        </div>
                    </div>
                </div>

                <div v-else-if="mode === 'result'" class="card final-score-card">
                    <h2>🎉 测试完成 🎉</h2>
                    <p style="font-size: 1.8rem; margin: 20px 0; font-weight: 700;">{{ correctCount }} / {{ totalQuestions }}</p>
                    <p>正确率: {{ Math.round(correctCount/totalQuestions*100) }}%</p>
                    
                    <div v-if="mistakeList.length > 0" class="mistake-list">
                        <h3 style="margin-bottom: 16px; color:#bc5a2c;">📋 错题本（{{ mistakeList.length }} 道）</h3>
                        <div v-for="(mistake, idx) in mistakeList" :key="idx" class="mistake-item">
                            <div class="badge-mistake">第 {{ mistake.qNumber }} 题</div>
                            <div class="mistake-question">{{ mistake.questionText }}</div>
                            <div class="mistake-detail">
                                <span style="color:#c0392b;">✗ 你的答案：</span> {{ mistake.userAnswer.join('、') || '未作答' }}<br>
                                <span style="color:#27ae60;">✓ 正确答案：</span> {{ mistake.correctAnswer.join('、') }}<br>
                                <span style="color:#2c7da0;">📘 解析：</span> {{ mistake.explanation }}
                            </div>
                        </div>
                    </div>
                    <div v-else style="margin-top: 24px; padding: 20px; background: #e8f5e9; border-radius: 28px;">🎉 太棒了！全对！概念掌握非常扎实。</div>
                    
                    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                        <button class="new-quiz-btn" @click="startNewQuiz">🎲 新的一组随机题</button>
                        <button class="secondary" @click="exitToHome">🏠 返回主页</button>
                    </div>
                </div>
            </div>
        `,
        data() {
            return {
                mode: 'home',
                currentQuestions: [],
                currentIndex: 0,
                userAnswers: [],
                answerStatus: [],
                selectedForCurrent: [],
                showFeedback: false,
                isCurrentCorrect: false,
                submitted: false
            };
        },
        computed: {
            totalQuestions() { return this.currentQuestions.length; },
            answeredCount() {
                let count = 0;
                for (let i = 0; i < this.answerStatus.length; i++) {
                    if (this.answerStatus[i] !== undefined) count++;
                }
                return count;
            },
            correctCount() {
                let count = 0;
                for (let i = 0; i < this.answerStatus.length; i++) {
                    if (this.answerStatus[i] === true) count++;
                }
                return count;
            },
            quizFinished() {
                if (this.totalQuestions === 0) return false;
                for (let i = 0; i < this.totalQuestions; i++) {
                    if (this.answerStatus[i] === undefined) return false;
                }
                return true;
            },
            currentQuestion() {
                if (this.currentQuestions.length === 0) return { options: [], text: '', correct: [] };
                return this.currentQuestions[this.currentIndex] || { options: [], text: '', correct: [] };
            },
            mistakeList() {
                const mistakes = [];
                for (let i = 0; i < this.currentQuestions.length; i++) {
                    if (this.answerStatus[i] === false) {
                        mistakes.push({
                            qNumber: i+1,
                            questionText: this.currentQuestions[i].text,
                            userAnswer: this.userAnswers[i] || [],
                            correctAnswer: this.currentQuestions[i].correct,
                            explanation: this.currentQuestions[i].explanation
                        });
                    }
                }
                return mistakes;
            }
        },
        watch: {
            currentIndex(newIdx) {
                if (!this.currentQuestions.length) return;
                this.submitted = false;
                if (this.userAnswers[newIdx]) {
                    this.selectedForCurrent = [...this.userAnswers[newIdx]];
                    this.showFeedback = true;
                    this.isCurrentCorrect = this.answerStatus[newIdx];
                    this.submitted = true;
                } else {
                    this.selectedForCurrent = [];
                    this.showFeedback = false;
                    this.isCurrentCorrect = false;
                    this.submitted = false;
                }
            },
            quizFinished(val) {
                if (val && this.mode === 'quiz') {
                    this.mode = 'result';
                }
            }
        },
        methods: {
            startNewQuiz() {
                this.currentQuestions = getRandomQuestions(10);
                this.currentIndex = 0;
                this.userAnswers = new Array(10).fill(undefined);
                this.answerStatus = new Array(10).fill(undefined);
                this.selectedForCurrent = [];
                this.showFeedback = false;
                this.isCurrentCorrect = false;
                this.submitted = false;
                this.mode = 'quiz';
            },
            toggleOption(opt) {
                if (this.submitted) return;
                const idx = this.selectedForCurrent.indexOf(opt);
                if (idx === -1) this.selectedForCurrent.push(opt);
                else this.selectedForCurrent.splice(idx, 1);
            },
            clearCurrent() {
                if (this.submitted) return;
                this.selectedForCurrent = [];
            },
            submitAnswer() {
                if (this.submitted) {
                    alert("本题已提交，请继续下一题");
                    return;
                }
                if (this.selectedForCurrent.length === 0) {
                    alert("请至少选择一个选项");
                    return;
                }
                const q = this.currentQuestion;
                const userSorted = [...this.selectedForCurrent].sort();
                const correctSorted = [...q.correct].sort();
                const isCorrect = userSorted.length === correctSorted.length && userSorted.every((v,i) => v === correctSorted[i]);
                
                this.userAnswers[this.currentIndex] = [...this.selectedForCurrent];
                this.answerStatus[this.currentIndex] = isCorrect;
                this.showFeedback = true;
                this.isCurrentCorrect = isCorrect;
                this.submitted = true;
            },
            nextQuestion() {
                if (this.currentIndex < this.totalQuestions - 1) {
                    this.currentIndex++;
                }
            },
            prevQuestion() {
                if (this.currentIndex > 0) this.currentIndex--;
            },
            exitToHome() {
                if (confirm("返回主页会丢失当前测试进度，确定吗？")) {
                    this.mode = 'home';
                }
            }
        }
    });
</script>
</body>
</html>
